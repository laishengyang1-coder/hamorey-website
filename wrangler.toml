# ============================================================
# 和膜 HAMOREY V1 — Cloudflare Pages + Workers 配置
# ============================================================

name = "hamorey-website-v1"
compatibility_date = "2024-07-29"
pages_build_output_dir = "dist"

# ============================================================
# D1 数据库 binding
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "hamorey-db"
database_id = "local"

# ============================================================
# R2 存储桶 binding（施工照片 / 质保证书 PDF）
# ============================================================
[[r2_buckets]]
binding = "R2"
bucket_name = "hamorey-assets"

# ============================================================
# 环境变量
# ============================================================
[vars]
SITE_URL = "https://hemoppf.com"
BRAND_NAME = "和膜 HAMOREY"
BRAND_NAME_EN = "HAMOREY"
